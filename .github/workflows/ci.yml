name: CI

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet-build:
    name: .NET Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  dotnet-test:
    name: .NET Tests
    needs: dotnet-build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --verbosity normal --configuration Release

  spa-build:
    name: Admin UI Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-${{ runner.os }}-${{ hashFiles('TetraControl2Connect/AdminUI/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        working-directory: TetraControl2Connect/AdminUI
        run: pnpm install --frozen-lockfile

      - name: Build SPA
        working-directory: TetraControl2Connect/AdminUI
        run: pnpm run generate

  playwright-tests:
    name: Playwright E2E Tests
    needs: dotnet-build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-${{ runner.os }}-${{ hashFiles('TetraControl2Connect/AdminUI/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Build and start .NET backend
        run: |
          dotnet build --configuration Release
          dotnet run --project TetraControl2Connect/TetraControl2Connect.csproj --configuration Release --no-build &
          echo "Waiting for backend to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:5050/api/settings > /dev/null 2>&1; then
              echo "Backend is ready."
              break
            fi
            sleep 2
          done
        env:
          ASPNETCORE_URLS: http://localhost:5050
          ASPNETCORE_ENVIRONMENT: Production

      - name: Install Admin UI dependencies
        working-directory: TetraControl2Connect/AdminUI
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: TetraControl2Connect/AdminUI
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: TetraControl2Connect/AdminUI
        run: pnpm exec playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: TetraControl2Connect/AdminUI/playwright-report/
          retention-days: 14
