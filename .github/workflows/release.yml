name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  version:
    name: Determine release version from tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.set_version.outputs.release_tag }}
      release_version: ${{ steps.set_version.outputs.release_version }}
      numeric_version: ${{ steps.set_version.outputs.numeric_version }}
      is_prerelease: ${{ steps.set_version.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Ensure tag commit is on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag commit is not part of main. Aborting." >&2
            exit 1
          fi
          echo "Tag commit is on main."
      - name: Validate tag and normalize versions
        id: set_version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "Error: Workflow must be triggered by a tag 'v*'." >&2
            exit 1
          fi
          tag="${GITHUB_REF#refs/tags/}"
          ver="${tag#v}"
          numericVer="${ver%%-*}"
          isPrerelease=false
          if [[ "$ver" == *-* ]]; then
            isPrerelease=true
          fi
          echo "Release tag: $tag"
          echo "Release version: $ver"
          echo "Numeric assembly/file version: $numericVer"
          echo "Prerelease: $isPrerelease"
          {
            echo "release_tag=$tag"
            echo "release_version=$ver"
            echo "numeric_version=$numericVer"
            echo "is_prerelease=$isPrerelease"
          } >> "$GITHUB_OUTPUT"
      - name: Show previous tag diff (informational)
        shell: bash
        run: |
          git fetch --tags --quiet
          current="${GITHUB_REF#refs/tags/}"
          prev=$(git tag --sort=-creatordate | grep -v "^${current}$" | head -n1 || true)
          if [[ -z "$prev" ]]; then
            echo "First release tag (no previous tag found)."
            exit 0
          fi
          diffCount=$(git diff --name-only "$prev" "$current" | wc -l | tr -d ' ')
          if [[ "$diffCount" == "0" ]]; then
            echo "Warning: No changes between $prev and $current." >&2
          else
            echo "Changed files since $prev: $diffCount"
          fi

  build_and_package:
    name: Build and package (${{ matrix.rid }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x86
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-${{ runner.os }}-${{ hashFiles('TetraControl2Connect/AdminUI/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Publish self-contained executable
        shell: pwsh
        run: |
          $rid = '${{ matrix.rid }}'
          $workspace = '${{ github.workspace }}'
          $outDir = Join-Path $workspace (Join-Path 'publish' $rid)
          $releaseVersion = '${{ needs.version.outputs.release_version }}'
          $numericVersion = '${{ needs.version.outputs.numeric_version }}'
          $commitShort = git rev-parse --short HEAD
          Write-Host "Publishing for $rid (ReleaseVersion=$releaseVersion, NumericVersion=$numericVersion, Commit=$commitShort)"
          dotnet publish TetraControl2Connect/TetraControl2Connect.csproj `
            -c Release `
            -r $rid `
            /p:PublishSingleFile=true `
            /p:PublishTrimmed=false `
            /p:SelfContained=true `
            /p:Version=$releaseVersion `
            /p:AssemblyVersion=$numericVersion `
            /p:FileVersion=$numericVersion `
            /p:InformationalVersion="$releaseVersion+$commitShort" `
            -o $outDir

      - name: Prepare artifact folder
        shell: pwsh
        run: |
          $workspace = '${{ github.workspace }}'
          $rid = '${{ matrix.rid }}'
          $publishDir = Join-Path $workspace (Join-Path 'publish' $rid)
          if (-Not (Test-Path $publishDir)) { Write-Error "Publish directory not found: $publishDir"; exit 1 }
          $exeName = if ($rid -like 'win-*') { 'FeuerSoftware.TetraControl2Connect.exe' } else { 'FeuerSoftware.TetraControl2Connect' }
          $exePath = Join-Path $publishDir $exeName
          if (-Not (Test-Path $exePath)) { Write-Error "Expected executable not found: $exePath"; exit 1 }
          $artifactDir = Join-Path $workspace ('artifact_' + $rid)
          if (Test-Path $artifactDir) { Remove-Item -Recurse -Force $artifactDir }
          New-Item -ItemType Directory -Path $artifactDir | Out-Null
          Copy-Item -Path (Join-Path $publishDir '*') -Destination $artifactDir -Recurse -Force
          # Copy documentation files
          $extras = @('readme.md', 'LICENSE')
          foreach ($e in $extras) {
            $full = Join-Path $workspace $e
            if (Test-Path $full) { Copy-Item -Path $full -Destination $artifactDir -Force }
          }

      - name: Create ZIP package
        shell: pwsh
        run: |
          $workspace = '${{ github.workspace }}'
          $rid = '${{ matrix.rid }}'
          $artifactDir = Join-Path $workspace ('artifact_' + $rid)
          $version = '${{ needs.version.outputs.release_version }}'
          $zipName = "tetracontrol2connect-$version-$rid.zip"
          $releaseDir = Join-Path $workspace 'release'
          if (-Not (Test-Path $releaseDir)) { New-Item -ItemType Directory -Path $releaseDir | Out-Null }
          $zipPath = Join-Path $releaseDir $zipName
          if (Test-Path $zipPath) { Remove-Item -Force $zipPath }
          Compress-Archive -Path (Join-Path $artifactDir '*') -DestinationPath $zipPath -Force

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: tetracontrol2connect-${{ needs.version.outputs.release_version }}-${{ matrix.rid }}
          path: release/tetracontrol2connect-${{ needs.version.outputs.release_version }}-${{ matrix.rid }}.zip

  build_simulator:
    name: Build simulator (${{ matrix.rid }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Publish simulator
        shell: pwsh
        run: |
          $rid = '${{ matrix.rid }}'
          $workspace = '${{ github.workspace }}'
          $outDir = Join-Path $workspace (Join-Path 'publish-sim' $rid)
          $releaseVersion = '${{ needs.version.outputs.release_version }}'
          $numericVersion = '${{ needs.version.outputs.numeric_version }}'
          $commitShort = git rev-parse --short HEAD
          Write-Host "Publishing simulator for $rid (ReleaseVersion=$releaseVersion, NumericVersion=$numericVersion)"
          dotnet publish TetraControl2Connect.Simulator/TetraControl2Connect.Simulator.csproj `
            -c Release `
            -r $rid `
            /p:PublishSingleFile=true `
            /p:PublishTrimmed=false `
            /p:SelfContained=true `
            /p:Version=$releaseVersion `
            /p:AssemblyVersion=$numericVersion `
            /p:FileVersion=$numericVersion `
            /p:InformationalVersion="$releaseVersion+$commitShort" `
            -o $outDir

      - name: Prepare simulator artifact
        shell: pwsh
        run: |
          $workspace = '${{ github.workspace }}'
          $rid = '${{ matrix.rid }}'
          $publishDir = Join-Path $workspace (Join-Path 'publish-sim' $rid)
          if (-Not (Test-Path $publishDir)) { Write-Error "Publish directory not found: $publishDir"; exit 1 }
          $exeName = if ($rid -like 'win-*') { 'FeuerSoftware.TetraControl2Connect.Simulator.exe' } else { 'FeuerSoftware.TetraControl2Connect.Simulator' }
          $exePath = Join-Path $publishDir $exeName
          if (-Not (Test-Path $exePath)) { Write-Error "Expected executable not found: $exePath"; exit 1 }
          $artifactDir = Join-Path $workspace ('artifact_sim_' + $rid)
          if (Test-Path $artifactDir) { Remove-Item -Recurse -Force $artifactDir }
          New-Item -ItemType Directory -Path $artifactDir | Out-Null
          Copy-Item -Path (Join-Path $publishDir '*') -Destination $artifactDir -Recurse -Force
          Copy-Item -Path (Join-Path $workspace 'LICENSE') -Destination $artifactDir -Force

      - name: Create simulator ZIP
        shell: pwsh
        run: |
          $workspace = '${{ github.workspace }}'
          $rid = '${{ matrix.rid }}'
          $artifactDir = Join-Path $workspace ('artifact_sim_' + $rid)
          $version = '${{ needs.version.outputs.release_version }}'
          $zipName = "tetracontrol2connect-simulator-$version-$rid.zip"
          $releaseDir = Join-Path $workspace 'release'
          if (-Not (Test-Path $releaseDir)) { New-Item -ItemType Directory -Path $releaseDir | Out-Null }
          $zipPath = Join-Path $releaseDir $zipName
          if (Test-Path $zipPath) { Remove-Item -Force $zipPath }
          Compress-Archive -Path (Join-Path $artifactDir '*') -DestinationPath $zipPath -Force

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: tetracontrol2connect-simulator-${{ needs.version.outputs.release_version }}-${{ matrix.rid }}
          path: release/tetracontrol2connect-simulator-${{ needs.version.outputs.release_version }}-${{ matrix.rid }}.zip

  integrity:
    name: Generate checksums
    needs: [version, build_and_package, build_simulator]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: build_artifacts

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          ART_DIR=build_artifacts
          mapfile -t ZIP_FILES < <(find "$ART_DIR" -type f -name '*.zip')
          if [ ${#ZIP_FILES[@]} -eq 0 ]; then echo "No ZIP files found" >&2; exit 1; fi
          OUT_FILE="$ART_DIR/checksums.sha256.txt"
          rm -f "$OUT_FILE"
          for z in "${ZIP_FILES[@]}"; do
            sha256sum "$z" | awk '{print tolower($1)"  "$2}' >> "$OUT_FILE"
          done

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: integrity-assets
          path: build_artifacts/checksums.sha256.txt

  publish_release:
    name: Create GitHub Release
    needs: [version, build_and_package, build_simulator, integrity]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Create release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          ver='${{ needs.version.outputs.release_version }}'
          tag='${{ needs.version.outputs.release_tag }}'
          isPrerelease='${{ needs.version.outputs.is_prerelease }}'
          mapfile -t files < <(find downloaded_artifacts -type f -name '*.zip')
          if [ ${#files[@]} -eq 0 ]; then echo "No ZIP files to upload" >&2; exit 1; fi
          checksums=$(find downloaded_artifacts -type f -name 'checksums.sha256.txt' -maxdepth 2 || true)
          assets=( "${files[@]}" )
          if [ -n "$checksums" ]; then
            assets+=( "$checksums" )
          fi
          echo "Assets: ${#files[@]} ZIP(s)"
          [ -n "$checksums" ] && echo "Checksums file: $checksums"
          title="TetraControl2Connect $tag"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo 'Release exists: uploading/refreshing assets'
            if [[ "$isPrerelease" == 'true' ]]; then
              gh release edit "$tag" --title "$title" --prerelease
            else
              gh release edit "$tag" --title "$title"
            fi
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            echo 'Creating new release with auto-generated notes'
            createArgs=( --title "$title" --generate-notes )
            if [[ "$isPrerelease" == 'true' ]]; then
              createArgs+=( --prerelease )
            fi
            gh release create "$tag" "${assets[@]}" "${createArgs[@]}"
          fi

      - name: Upload final artifacts bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ needs.version.outputs.release_version }}
          path: downloaded_artifacts
